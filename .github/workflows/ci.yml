name: CI

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'tsconfig*.json'
      - 'eslint.config.js'
      - '.github/workflows/ci.yml'
      - '.github/scripts/**'
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'tsconfig*.json'
      - 'eslint.config.js'
      - '.github/workflows/ci.yml'
      - '.github/scripts/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Push CI and manual exact-head CI must not cancel each other. Repeated runs
  # for the same event/ref still cancel stale attempts.
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history so the interface-fence gate can diff the whole PR
          # range (base..HEAD) — not just the last commit — and so check:fence
          # / lint:budget have origin/master to compare against.
          fetch-depth: 0

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # ── Orchestration-framework enforcement gates (ci-gate-consolidation) ──
      # These four checks were local-only until 2026-06-09, so the fence /
      # source-budget / doc-link / dead-code rules the agent-orchestration
      # framework depends on were unenforced on PRs. They are now BLOCKING:
      # a PR that touches a fenced interface without `[interface-change]`, grows
      # a grandfathered file past its snapshot, breaks a doc link, or adds an
      # orphan module / unlisted dependency fails CI here.
      - name: Interface-fence gate
        # Diff the full PR range against origin/master and require the
        # `[interface-change]` marker in the PR title when the fence file is
        # touched. On push builds PR_TITLE is empty and the title check is
        # skipped; the commit-subject marker is still enforced by the script.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ -n "$PR_TITLE" ]; then
            npm run check:fence -- --base origin/master --pr-title "$PR_TITLE"
          else
            npm run check:fence -- --base origin/master
          fi

      - name: Source-budget gate
        run: npm run lint:budget

      - name: Doc-link gate
        run: npm run lint:docs

      # knip:ci gates the high-signal dead-code categories (unused FILES,
      # unlisted / unused / unresolved dependencies, missing binaries). The
      # export-level unused-symbol backlog stays advisory via `npm run deadcode`
      # (full knip) and shrinks as Phase 5 `delete-orphan-modules` lands; known
      # orphan files are listed under `knip.ignore` in package.json with that
      # deferral. Duplicate-export detection is excluded (one intentional
      # NPC-height alias would false-fail it).
      - name: Dead-code gate
        run: npm run knip:ci

      - name: Doc-drift gate
        run: npm run check:doc-drift

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Unit and integration tests
        run: npm run test:run

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Playwright browser jobs ──────────────────────────────────────────────
  # smoke / mobile-ui / perf run inside the official Playwright image, which
  # ships the matching Chromium PRE-EXTRACTED. This sidesteps the GitHub-runner
  # `playwright install` hang where the chromium zip downloaded to 100% then the
  # post-download unzip stalled to the job timeout (3/3 retries; see commit
  # 386bd4cd and docs/state/perf-trust.md). No `playwright install` step is
  # needed in-container.
  # IMPORTANT: the image tag MUST track the `playwright` version in the lockfile
  # (currently 1.59.1). A playwright bump must bump `v1.59.1-noble` in lockstep,
  # or the npm package and the baked browser revision diverge and the download
  # (and the hang) returns. The image bundles Node 22; setup-node pins Node 24
  # per .nvmrc over it. openssh-client is ensured for the deploy-key checkout.

  smoke:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 15
    needs: [lint, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure SSH client present (container)
        run: command -v ssh-keyscan >/dev/null 2>&1 || { apt-get update && apt-get install -y --no-install-recommends openssh-client; }

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Production smoke
        run: npm run smoke:prod

  mobile-ui-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      hit: ${{ steps.filter.outputs.hit }}
      full: ${{ steps.label.outputs.full }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - name: Path filter
        id: filter
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.sha }}"
          if [ -z "$base" ]; then base="$head^"; fi
          changed=$(git diff --name-only "$base" "$head" 2>/dev/null || git diff --name-only HEAD^ HEAD)
          echo "Changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^(src/ui/|src/systems/player/PlayerInput|index\.html|scripts/mobile-ui-check\.ts|\.github/workflows/ci\.yml)'; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Detect mobile-full label
        id: label
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels) }}
        run: |
          if echo "$LABELS" | grep -q '"name": "mobile-full"'; then
            echo "full=true" >> "$GITHUB_OUTPUT"
          else
            echo "full=false" >> "$GITHUB_OUTPUT"
          fi

  mobile-ui:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    # Default to 1 device for fast feedback. PRs that touch UI / player input /
    # index.html trigger the path filter; PRs with the `mobile-full` label
    # fan out to the full 4-device matrix. Original 4-device matrix sat on
    # an 18-min ceiling per device; this default cuts wall-clock by ~3/4.
    timeout-minutes: 18
    needs: [lint, test, mobile-ui-changes]
    if: needs.mobile-ui-changes.outputs.hit == 'true' || needs.mobile-ui-changes.outputs.full == 'true'
    strategy:
      # Don't kill sibling devices when one fails — full coverage when the
      # matrix fans out.
      fail-fast: false
      matrix:
        device: ${{ needs.mobile-ui-changes.outputs.full == 'true' && fromJSON('["android-390x844","android-844x390","android-740x360","phone-667x375"]') || fromJSON('["android-390x844"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure SSH client present (container)
        run: command -v ssh-keyscan >/dev/null 2>&1 || { apt-get update && apt-get install -y --no-install-recommends openssh-client; }

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Mobile UI gate
        run: npm run check:mobile-ui -- --device-id ${{ matrix.device }}

      - name: Upload mobile UI artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-ui-artifacts-${{ matrix.device }}
          path: artifacts/mobile-ui/**
          retention-days: 7

  perf-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      hit: ${{ steps.filter.outputs.hit }}
      full: ${{ steps.label.outputs.full }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - name: Path filter
        id: filter
        # NOTE: the perf job is ADVISORY (raw-metrics only, non-gating). There is
        # no tracked baseline — perf-baselines.json was permanently removed
        # 2026-06-02, so the old `perf-baselines\.json` trigger here was dead and
        # is removed (ci-gate-consolidation). `perf:compare` prints raw
        # latest-capture numbers and does not gate until STABILIZAT-1
        # re-establishes a baseline on a quiet machine; see
        # docs/state/perf-trust.md and docs/CARRY_OVERS.md (STABILIZAT-1).
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.sha }}"
          if [ -z "$base" ]; then base="$head^"; fi
          changed=$(git diff --name-only "$base" "$head" 2>/dev/null || git diff --name-only HEAD^ HEAD)
          echo "Changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^(src/systems/combat/|src/core/|src/systems/terrain/|scripts/perf-|\.github/workflows/ci\.yml)'; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Detect perf-full label
        id: label
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels) }}
        run: |
          if echo "$LABELS" | grep -q '"name": "perf-full"'; then
            echo "full=true" >> "$GITHUB_OUTPUT"
          else
            echo "full=false" >> "$GITHUB_OUTPUT"
          fi

  perf:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 25
    needs: [perf-changes]
    if: needs.perf-changes.outputs.hit == 'true' || needs.perf-changes.outputs.full == 'true'
    # ADVISORY BY DESIGN: GPU-less CI cannot produce a trustworthy perf capture
    # (CI captures hard-timeout / finalFrameCount 0 — see docs/state/perf-trust.md),
    # so the job stays continue-on-error and emits a perf-advisory-report. The
    # container fixes the prior `playwright install` extract-hang so the advisory
    # capture can actually run; this is no longer about the install hang.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure SSH client present (container)
        run: command -v ssh-keyscan >/dev/null 2>&1 || { apt-get update && apt-get install -y --no-install-recommends openssh-client; }

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Build perf-harness bundle
        run: npm run build:perf

      - name: Capture combat120 scenario
        env:
          PERF_STARTUP_TIMEOUT: 90
        run: xvfb-run -a npm run perf:capture:combat120
        continue-on-error: true

      - name: Compare against baselines
        run: npm run perf:compare -- --scenario combat120
        continue-on-error: true

      - name: Summarize perf advisory status
        if: always()
        run: npx tsx scripts/perf-advisory-report.ts --scenario combat120

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-capture-artifacts
          path: artifacts/perf/**
          retention-days: 7
