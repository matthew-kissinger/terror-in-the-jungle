name: CI

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'tsconfig*.json'
      - 'eslint.config.js'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'tsconfig*.json'
      - 'eslint.config.js'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    # Shared install + build runs once. Downstream jobs restore the cache
    # instead of re-running `npm ci` + game-field-kits checkout + build five
    # separate times (~20 cumulative compute min per PR pre-this-job).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute setup cache key
        id: cache-key
        run: |
          key="${{ runner.os }}-setup-${{ hashFiles('package-lock.json', '.github/scripts/checkout-game-field-kits.sh', '.github/scripts/build-game-field-kits.sh') }}"
          echo "key=$key" >> "$GITHUB_OUTPUT"

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Save setup cache
        uses: actions/cache/save@v4
        with:
          key: ${{ steps.cache-key.outputs.key }}
          path: |
            node_modules
            dist
            ../game-field-kits

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Restore setup cache
        uses: actions/cache/restore@v4
        with:
          key: ${{ needs.setup.outputs.cache-key }}
          path: |
            node_modules
            dist
            ../game-field-kits
          fail-on-cache-miss: true

      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Restore setup cache
        uses: actions/cache/restore@v4
        with:
          key: ${{ needs.setup.outputs.cache-key }}
          path: |
            node_modules
            dist
            ../game-field-kits
          fail-on-cache-miss: true

      - name: Unit and integration tests
        run: npm run test:run

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Restore setup cache
        uses: actions/cache/restore@v4
        with:
          key: ${{ needs.setup.outputs.cache-key }}
          path: |
            node_modules
            dist
            ../game-field-kits
          fail-on-cache-miss: true

      - name: Build
        run: npm run build

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, lint, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Restore setup cache
        uses: actions/cache/restore@v4
        with:
          key: ${{ needs.setup.outputs.cache-key }}
          path: |
            node_modules
            dist
            ../game-field-kits
          fail-on-cache-miss: true

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Production smoke
        run: npm run smoke:prod

  mobile-ui-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      hit: ${{ steps.filter.outputs.hit }}
      full: ${{ steps.label.outputs.full }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - name: Path filter
        id: filter
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.sha }}"
          if [ -z "$base" ]; then base="$head^"; fi
          changed=$(git diff --name-only "$base" "$head" 2>/dev/null || git diff --name-only HEAD^ HEAD)
          echo "Changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^(src/ui/|src/systems/player/PlayerInput|index\.html|scripts/mobile-ui-check\.ts|\.github/workflows/ci\.yml)'; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Detect mobile-full label
        id: label
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels) }}
        run: |
          if echo "$LABELS" | grep -q '"name": "mobile-full"'; then
            echo "full=true" >> "$GITHUB_OUTPUT"
          else
            echo "full=false" >> "$GITHUB_OUTPUT"
          fi

  mobile-ui:
    runs-on: ubuntu-latest
    # Default to 1 device for fast feedback. PRs that touch UI / player input /
    # index.html trigger the path filter; PRs with the `mobile-full` label
    # fan out to the full 4-device matrix. Original 4-device matrix sat on
    # an 18-min ceiling per device; this default cuts wall-clock by ~3/4.
    timeout-minutes: 18
    needs: [setup, lint, test, mobile-ui-changes]
    if: needs.mobile-ui-changes.outputs.hit == 'true' || needs.mobile-ui-changes.outputs.full == 'true'
    strategy:
      # Don't kill sibling devices when one fails — full coverage when the
      # matrix fans out.
      fail-fast: false
      matrix:
        device: ${{ needs.mobile-ui-changes.outputs.full == 'true' && fromJSON('["android-390x844","android-844x390","android-740x360","phone-667x375"]') || fromJSON('["android-390x844"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Restore setup cache
        uses: actions/cache/restore@v4
        with:
          key: ${{ needs.setup.outputs.cache-key }}
          path: |
            node_modules
            dist
            ../game-field-kits
          fail-on-cache-miss: true

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Mobile UI gate
        run: npm run check:mobile-ui -- --device-id ${{ matrix.device }}

      - name: Upload mobile UI artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-ui-artifacts-${{ matrix.device }}
          path: artifacts/mobile-ui/**
          retention-days: 7

  perf-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      hit: ${{ steps.filter.outputs.hit }}
      full: ${{ steps.label.outputs.full }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - name: Path filter
        id: filter
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.sha }}"
          if [ -z "$base" ]; then base="$head^"; fi
          changed=$(git diff --name-only "$base" "$head" 2>/dev/null || git diff --name-only HEAD^ HEAD)
          echo "Changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^(src/systems/combat/|src/core/|src/systems/terrain/|scripts/perf-|\.github/workflows/ci\.yml|perf-baselines\.json)'; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Detect perf-full label
        id: label
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels) }}
        run: |
          if echo "$LABELS" | grep -q '"name": "perf-full"'; then
            echo "full=true" >> "$GITHUB_OUTPUT"
          else
            echo "full=false" >> "$GITHUB_OUTPUT"
          fi

  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [setup, perf-changes]
    if: needs.perf-changes.outputs.hit == 'true' || needs.perf-changes.outputs.full == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Restore setup cache
        uses: actions/cache/restore@v4
        with:
          key: ${{ needs.setup.outputs.cache-key }}
          path: |
            node_modules
            dist
            ../game-field-kits
          fail-on-cache-miss: true

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build perf-harness bundle
        run: npm run build:perf

      - name: Capture combat120 scenario
        env:
          PERF_STARTUP_TIMEOUT: 90
        run: xvfb-run -a npm run perf:capture:combat120
        continue-on-error: true

      - name: Compare against baselines
        run: npm run perf:compare -- --scenario combat120
        continue-on-error: true

      - name: Summarize perf advisory status
        if: always()
        run: npx tsx scripts/perf-advisory-report.ts --scenario combat120

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-capture-artifacts
          path: artifacts/perf/**
          retention-days: 7
