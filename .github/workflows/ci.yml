name: CI

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'tsconfig*.json'
      - 'eslint.config.js'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'tsconfig*.json'
      - 'eslint.config.js'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Unit and integration tests
        run: npm run test:run

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Production smoke
        run: npm run smoke:prod

  mobile-ui:
    runs-on: ubuntu-latest
    # Each device case observed taking ~12 min on the post-WebGPU mode-startup
    # path (KB-STARTUP-1 mobile-emulation bake stall). 18 min per device gives
    # 50% headroom; matrix fans the 4 devices out in parallel so the wall-time
    # gate is max-of-devices, not sum. Pre-fan-out, the single sequential job
    # took ~48 min and could never fit in any reasonable timeout.
    timeout-minutes: 18
    needs: [lint, test]
    strategy:
      # Don't kill sibling devices when one fails — we want full coverage per push.
      fail-fast: false
      matrix:
        device:
          - android-390x844
          - android-844x390
          - android-740x360
          - phone-667x375

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Mobile UI gate
        run: npm run check:mobile-ui -- --device-id ${{ matrix.device }}

      - name: Upload mobile UI artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-ui-artifacts-${{ matrix.device }}
          path: artifacts/mobile-ui/**
          retention-days: 7

  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build perf-harness bundle
        run: npm run build:perf

      - name: Capture combat120 scenario
        env:
          PERF_STARTUP_TIMEOUT: 90
        run: xvfb-run -a npm run perf:capture:combat120
        continue-on-error: true

      - name: Compare against baselines
        run: npm run perf:compare -- --scenario combat120
        continue-on-error: true

      - name: Summarize perf advisory status
        if: always()
        run: npx tsx scripts/perf-advisory-report.ts --scenario combat120

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-capture-artifacts
          path: artifacts/perf/**
          retention-days: 7
