name: Performance Regression Check

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - '.github/workflows/perf-check.yml'
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - '.github/workflows/perf-check.yml'

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      
      - name: Build
        run: npm run build
      
      - name: Capture primary regression scenario (combat120)
        continue-on-error: true
        env:
          PERF_STARTUP_TIMEOUT: 90
        run: xvfb-run -a npm run perf:capture:combat120
      
      - name: Analyze latest capture
        if: always()
        continue-on-error: true
        run: npm run perf:analyze:latest

      - name: Compare against baselines
        if: always()
        run: |
          if ls artifacts/perf/*/summary.json 1>/dev/null 2>&1; then
            npm run perf:compare -- --scenario combat120
          else
            echo "No capture artifacts found, skipping comparison"
          fi

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-capture-artifacts
          path: artifacts/perf/**
          retention-days: 7
