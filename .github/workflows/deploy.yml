name: Deploy

# Manual-only. Trigger via GitHub UI ("Run workflow" on the Actions tab)
# or from a terminal: `gh workflow run deploy.yml` (or `npm run deploy:prod`).
# Deploys whatever ref is selected (default: master tip).

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout game field kits
        env:
          GAME_FIELD_KITS_DEPLOY_KEY: ${{ secrets.GAME_FIELD_KITS_DEPLOY_KEY }}
        run: bash .github/scripts/checkout-game-field-kits.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Build game field kits packages
        run: bash .github/scripts/build-game-field-kits.sh

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload and validate Cloudflare game assets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TITJ_R2_BUCKET: titj-game-assets-prod
          TITJ_ASSET_BASE_URL: https://pub-d965f26ac79947f091f25cf31ac4b48d.r2.dev
          TITJ_SKIP_R2_UPLOAD: '1'
        run: npm run cloudflare:assets:upload

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name terror-in-the-jungle
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          packageManager: npm
