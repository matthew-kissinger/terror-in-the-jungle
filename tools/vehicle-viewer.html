<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GLB Vehicle Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Consolas', 'Monaco', monospace; overflow: hidden; }

  #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  /* HUD overlay */
  #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  #hud > * { pointer-events: auto; }

  /* Top bar */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    border-bottom: 1px solid #333;
    z-index: 10;
  }
  #topbar h1 { font-size: 14px; font-weight: 600; color: #8f8; white-space: nowrap; }
  #topbar .sep { width: 1px; height: 20px; background: #444; }

  /* Load button */
  #load-btn {
    padding: 5px 14px; border: 1px solid #555; border-radius: 4px;
    background: #2a2a4a; color: #ccc; font-family: inherit; font-size: 12px;
    cursor: pointer; transition: background 0.15s;
  }
  #load-btn:hover { background: #3a3a6a; border-color: #8f8; }

  /* Info readout */
  #info {
    font-size: 11px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1;
  }

  /* Drop zone overlay */
  #dropzone {
    display: none; position: absolute; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 100;
    justify-content: center; align-items: center;
    font-size: 24px; color: #8f8; border: 3px dashed #8f8;
  }
  #dropzone.active { display: flex; }

  /* Scene hierarchy panel */
  #hierarchy {
    position: absolute; top: 50px; right: 0; bottom: 0; width: 320px;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
    border-left: 1px solid #333;
    overflow-y: auto; padding: 10px; font-size: 11px;
    z-index: 5;
  }
  #hierarchy h2 { font-size: 12px; color: #8f8; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
  .node { padding: 2px 0; cursor: pointer; white-space: nowrap; }
  .node:hover { color: #fff; background: rgba(255,255,255,0.05); }
  .node.selected { color: #ff0; background: rgba(255,255,0,0.1); }
  .node-joint { color: #f8a; }
  .node-mesh { color: #8cf; }
  .node-group { color: #aaa; }
  .indent { display: inline-block; width: 16px; }
  .node-icon { display: inline-block; width: 14px; font-size: 10px; }
  .tri-count { color: #666; font-size: 10px; margin-left: 4px; }

  /* Bottom stats bar */
  #stats {
    position: absolute; bottom: 0; left: 0; right: 320px;
    padding: 8px 16px;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    border-top: 1px solid #333;
    font-size: 11px; color: #aaa;
    display: flex; gap: 20px; z-index: 5;
  }
  #stats .stat-label { color: #666; }
  #stats .stat-value { color: #ccc; }
  #stats .stat-warn { color: #fa0; }
  #stats .stat-ok { color: #8f8; }

  /* Toggle hierarchy button */
  #toggle-panel {
    position: absolute; top: 55px; right: 325px;
    padding: 4px 8px; border: 1px solid #444; border-radius: 3px;
    background: rgba(0,0,0,0.6); color: #888; font-size: 11px;
    cursor: pointer; z-index: 6; font-family: inherit;
  }
  #toggle-panel:hover { color: #fff; border-color: #8f8; }

  /* Controls help */
  #controls-help {
    position: absolute; bottom: 40px; left: 16px;
    font-size: 10px; color: #555; z-index: 5;
  }
</style>
</head>
<body>

<canvas id="viewport"></canvas>

<div id="hud">
  <div id="topbar">
    <h1>GLB Vehicle Viewer</h1>
    <div class="sep"></div>
    <button id="load-btn">Load GLB</button>
    <input type="file" id="file-input" accept=".glb,.gltf" style="display:none">
    <div class="sep"></div>
    <div id="info">Drop a .glb file or click Load GLB</div>
  </div>

  <div id="hierarchy">
    <h2>Scene Hierarchy</h2>
    <div id="tree">No model loaded</div>
  </div>

  <button id="toggle-panel">Panel</button>

  <div id="stats">
    <div><span class="stat-label">Tris: </span><span class="stat-value" id="stat-tris">-</span></div>
    <div><span class="stat-label">Meshes: </span><span class="stat-value" id="stat-meshes">-</span></div>
    <div><span class="stat-label">Joints: </span><span class="stat-value" id="stat-joints">-</span></div>
    <div><span class="stat-label">Size: </span><span class="stat-value" id="stat-size">-</span></div>
    <div><span class="stat-label">Bounds: </span><span class="stat-value" id="stat-bounds">-</span></div>
  </div>

  <div id="controls-help">
    LMB: Orbit &nbsp; RMB: Pan &nbsp; Scroll: Zoom &nbsp; Click node: Highlight mesh
  </div>
</div>

<div id="dropzone">Drop .glb file here</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Setup ---
const canvas = document.getElementById('viewport');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x1a1a2e);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(8, 5, 8);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1, 0);

// --- Lighting ---
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(10, 15, 8);
dirLight.castShadow = true;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x8899cc, 0.4);
fillLight.position.set(-6, 4, -8);
scene.add(fillLight);

// --- Ground grid ---
const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x2a2a2a);
scene.add(gridHelper);

const axesHelper = new THREE.AxesHelper(3);
axesHelper.position.set(-10, 0, -10);
scene.add(axesHelper);

// Axis labels
function makeLabel(text, pos, color) {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 32;
  const ctx = c.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = 'bold 24px monospace';
  ctx.fillText(text, 4, 24);
  const tex = new THREE.CanvasTexture(c);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
  sprite.position.copy(pos);
  sprite.scale.set(1, 0.5, 1);
  scene.add(sprite);
}
makeLabel('+X', new THREE.Vector3(-6.8, 0.3, -10), '#ff4444');
makeLabel('+Y', new THREE.Vector3(-10, 3.3, -10), '#44ff44');
makeLabel('+Z', new THREE.Vector3(-10, 0.3, -6.8), '#4488ff');

// Forward arrow (+Z indicator at origin)
const arrowZ = new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0.05, 0), 4, 0x4488ff, 0.4, 0.25);
scene.add(arrowZ);

// Scale reference bars (1m increments)
for (let i = 1; i <= 5; i++) {
  const bar = new THREE.Mesh(
    new THREE.BoxGeometry(0.02, 0.02, 0.02),
    new THREE.MeshBasicMaterial({ color: 0x888800 })
  );
  bar.position.set(i, 0, 0);
  scene.add(bar);
}

// --- State ---
let currentModel = null;
let highlightedMesh = null;
const originalMaterials = new Map();
const highlightMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true, depthTest: false });

// --- GLB Loader ---
const loader = new GLTFLoader();

function loadGLB(file) {
  const url = URL.createObjectURL(file);
  document.getElementById('info').textContent = `Loading: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;

  loader.load(url, (gltf) => {
    if (currentModel) {
      scene.remove(currentModel);
      originalMaterials.clear();
      highlightedMesh = null;
    }

    const model = gltf.scene;
    currentModel = model;
    scene.add(model);

    // Compute bounds for camera framing
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    // Frame camera
    const maxDim = Math.max(size.x, size.y, size.z);
    const dist = maxDim * 1.8;
    camera.position.set(center.x + dist * 0.7, center.y + dist * 0.5, center.z + dist * 0.7);
    controls.target.copy(center);
    controls.update();

    // Gather stats
    let triCount = 0;
    let meshCount = 0;
    let jointCount = 0;

    model.traverse((child) => {
      if (child.isMesh) {
        meshCount++;
        const geo = child.geometry;
        if (geo.index) {
          triCount += geo.index.count / 3;
        } else if (geo.attributes.position) {
          triCount += geo.attributes.position.count / 3;
        }
      }
      if (child.name.startsWith('Joint_')) jointCount++;
    });

    // Update stats
    document.getElementById('stat-tris').textContent = triCount.toLocaleString();
    document.getElementById('stat-tris').className = triCount > 10000 ? 'stat-value stat-warn' : 'stat-value stat-ok';
    document.getElementById('stat-meshes').textContent = meshCount;
    document.getElementById('stat-joints').textContent = jointCount;
    document.getElementById('stat-size').textContent = (file.size / 1024).toFixed(1) + ' KB';
    document.getElementById('stat-bounds').textContent =
      `${size.x.toFixed(1)} x ${size.y.toFixed(1)} x ${size.z.toFixed(1)} m`;

    document.getElementById('info').textContent =
      `${file.name} - ${triCount.toLocaleString()} tris, ${size.x.toFixed(1)} x ${size.y.toFixed(1)} x ${size.z.toFixed(1)} m`;

    // Build hierarchy tree
    buildTree(model);

    URL.revokeObjectURL(url);
  }, undefined, (err) => {
    document.getElementById('info').textContent = `Error: ${err.message}`;
  });
}

// --- Hierarchy tree ---
function buildTree(model) {
  const container = document.getElementById('tree');
  container.innerHTML = '';

  function addNode(obj, depth) {
    const div = document.createElement('div');
    div.className = 'node';

    // Classify node
    const name = obj.name || '(unnamed)';
    let cls = 'node-group';
    let icon = '>';
    if (name.startsWith('Joint_')) { cls = 'node-joint'; icon = 'J'; }
    else if (name.startsWith('Mesh_') || obj.isMesh) { cls = 'node-mesh'; icon = 'M'; }

    // Indent
    for (let i = 0; i < depth; i++) {
      const indent = document.createElement('span');
      indent.className = 'indent';
      indent.textContent = depth === i + 1 ? '|-' : '| ';
      div.appendChild(indent);
    }

    const iconSpan = document.createElement('span');
    iconSpan.className = `node-icon ${cls}`;
    iconSpan.textContent = icon + ' ';
    div.appendChild(iconSpan);

    const nameSpan = document.createElement('span');
    nameSpan.className = cls;
    nameSpan.textContent = name;
    div.appendChild(nameSpan);

    // Tri count for meshes
    if (obj.isMesh && obj.geometry) {
      const geo = obj.geometry;
      let tris = 0;
      if (geo.index) tris = geo.index.count / 3;
      else if (geo.attributes.position) tris = geo.attributes.position.count / 3;
      const triSpan = document.createElement('span');
      triSpan.className = 'tri-count';
      triSpan.textContent = `(${tris} tris)`;
      div.appendChild(triSpan);
    }

    // Type info
    const typeStr = obj.type;
    if (typeStr && typeStr !== 'Object3D' && typeStr !== 'Group' && typeStr !== 'Mesh') {
      const typeSpan = document.createElement('span');
      typeSpan.className = 'tri-count';
      typeSpan.textContent = ` [${typeStr}]`;
      div.appendChild(typeSpan);
    }

    // Click to highlight
    div.addEventListener('click', () => {
      // Deselect previous
      document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
      unhighlightMesh();

      div.classList.add('selected');
      highlightObject(obj);
    });

    container.appendChild(div);

    for (const child of obj.children) {
      addNode(child, depth + 1);
    }
  }

  addNode(model, 0);
}

function highlightObject(obj) {
  unhighlightMesh();

  obj.traverse((child) => {
    if (child.isMesh) {
      originalMaterials.set(child, child.material);
      child.material = highlightMaterial;
      highlightedMesh = obj;
    }
  });
}

function unhighlightMesh() {
  if (!highlightedMesh) return;
  highlightedMesh.traverse((child) => {
    if (child.isMesh && originalMaterials.has(child)) {
      child.material = originalMaterials.get(child);
    }
  });
  originalMaterials.clear();
  highlightedMesh = null;
}

// --- File input ---
const fileInput = document.getElementById('file-input');
document.getElementById('load-btn').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) loadGLB(e.target.files[0]);
});

// --- Drag and drop ---
const dropzone = document.getElementById('dropzone');

document.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropzone.classList.add('active');
});
document.addEventListener('dragleave', (e) => {
  if (e.relatedTarget === null || !document.body.contains(e.relatedTarget)) {
    dropzone.classList.remove('active');
  }
});
document.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file && (file.name.endsWith('.glb') || file.name.endsWith('.gltf'))) {
    loadGLB(file);
  }
});

// --- Toggle panel ---
const hierarchy = document.getElementById('hierarchy');
const toggleBtn = document.getElementById('toggle-panel');
toggleBtn.addEventListener('click', () => {
  const hidden = hierarchy.style.display === 'none';
  hierarchy.style.display = hidden ? '' : 'none';
  toggleBtn.textContent = hidden ? 'Panel' : 'Panel >';
  document.getElementById('stats').style.right = hidden ? '320px' : '0';
});

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animate ---
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// --- Load from URL param ---
const params = new URLSearchParams(window.location.search);
const glbPath = params.get('model');
if (glbPath) {
  fetch(glbPath)
    .then(r => r.blob())
    .then(blob => {
      const file = new File([blob], glbPath.split('/').pop(), { type: 'model/gltf-binary' });
      loadGLB(file);
    })
    .catch(err => {
      document.getElementById('info').textContent = `Failed to load ${glbPath}: ${err.message}`;
    });
}
</script>
</body>
</html>
