<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="icon" type="image/png" sizes="64x64" href="./favicon-64x64.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0a0e0c" />
    <link rel="manifest" href="/manifest.json" />
    <title>Terror in the Jungle</title>
    <link rel="preload" as="image" href="./assets/ui/icons/reticle-cobra-gun.png">
    <link rel="preload" as="image" href="./assets/ui/icons/reticle-rocket.png">
  </head>
  <body>
    <div id="boot-splash" style="
      position:fixed;inset:0;z-index:99999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#0a0e0c;color:rgba(220,210,170,0.88);
      font-family:system-ui,-apple-system,sans-serif;
    ">
      <div style="
        font-size:clamp(1.6rem,5vw,2.8rem);font-weight:500;
        letter-spacing:0.18em;text-transform:uppercase;
        margin-bottom:2rem;color:rgba(232,196,106,0.92);
      ">TERROR IN THE JUNGLE</div>
      <div style="width:200px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;">
        <div style="
          width:30%;height:100%;border-radius:2px;
          background:linear-gradient(90deg,#a07828,#c9952e,#e8c46a);
          animation:boot-pulse 1.2s ease-in-out infinite alternate;
        "></div>
      </div>
      <style>@keyframes boot-pulse{0%{width:20%;margin-left:0}100%{width:40%;margin-left:60%}}</style>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
